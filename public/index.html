<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Auto Negotiator — ClickShop Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <link rel="icon" href="/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/icons/favicon-192x192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    defer
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
</head>
<body>
  <!--
    Layout is now two stacked layers, not a page of stacked cards (#12):

      MapStage  — fixed, inset:0, z:0. The ink-toned OSM map fills the whole
                  viewport as the background plate. `.map--ink` drives the
                  monochrome tile recolor (see components.css).
      AppShell  — fixed, inset:0, z:10, pointer-events:none. A transparent
                  overlay whose panels (pointer-events:auto) float above the
                  live map; the map stays draggable in the gaps between them.

    Component hierarchy (mirrored 1:1 by public/js/components/*):
      ├── Nav                     (live counts pill — top-left)
      ├── LeftRail                (left rail, two independent panels)
      │   ├── TransfersPanel          → TransferRow × N
      │   └── TransferDetailPanel     (dismissable, #35) → AgentTimeline
      │       ├── ManagerReplyPanel       grouped by negotiation state
      │       └── RegionalOverridePanel
      ├── MapPanel                (full-bleed background → SiteMarker × N,
      │                            RouteArc × active transfers)
      └── SideRail                (right rail)
          ├── NetworkStatusPanel      → SiteCard × N
          └── SimulationControlsPanel
  -->
  <section class="map-stage" aria-label="Ops Map — Eastern Singapore">
    <div class="map-frame" id="map-frame">
      <div id="map" class="map map--ink" role="img" aria-label="Map of ClickShop sites across Eastern Singapore"></div>
    </div>
  </section>

  <div class="app-shell">
    <header class="nav-pill">
      <div class="nav-pill__brand">
        <span class="nav-pill__mark" aria-hidden="true"></span>
        <div>
          <p class="nav-pill__title">Auto Negotiator</p>
          <p class="nav-pill__subtitle">ClickShop Network — Eastern Singapore</p>
        </div>
      </div>
      <p class="nav-pill__status" id="nav-status">Loading network…</p>
    </header>

    <div class="left-rail" id="left-rail">
      <div
        id="transfers-pane-resize-handle"
        class="left-rail__resize-handle"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize transfers panel"
        tabindex="0"
      ></div>
      <div class="rail-grab-tab" id="transfers-grab-tab" aria-hidden="true"></div>
      <div class="rail-grab-tab" id="detail-grab-tab" aria-hidden="true" hidden></div>

      <main class="panel transfers-strip" aria-label="Transfers">
        <h2 class="eyebrow panel-header panel-header--flush panel-header--bleed-sides panel-header--static" id="transfers-heading">Transfers</h2>
        <div class="transfers-strip__list-body">
          <div id="transfer-list" class="transfer-list"></div>
        </div>
      </main>

      <div class="panel transfer-detail-panel" id="transfer-detail" hidden>
        <div class="detail-header panel-header panel-header--static">
          <div class="detail-header__title">
            <div class="detail-header__top-row">
              <p class="ticket-pill">Transfer <span id="detail-id">—</span></p>
              <div class="detail-header__actions">
                <p id="detail-status" class="status-pill"></p>
                <button id="detail-close-btn" class="detail-header__close" aria-label="Close transfer detail"></button>
              </div>
            </div>
            <h2 id="detail-summary" class="detail-header__summary">Select a transfer above to see its details.</h2>
          </div>
        </div>

        <div class="transfer-detail-panel__body">
          <div class="console-frame">
            <div class="panel-header panel-header--on-ink panel-header--split">
              <h3 class="eyebrow eyebrow--on-ink">
                Agent Timeline
                <span
                  class="info-hint"
                  tabindex="0"
                  aria-label="Donor re-routing only happens through the Concession Protocol: when a Manager Reply cites a specific, verifiable event, the agent verifies it and re-points this same Transfer at the next-ranked donor. There's no way to trigger this directly."
                  >?</span
                >
              </h3>
              <button id="console-copy-btn" class="btn btn--ghost-on-ink">Copy</button>
            </div>
            <div id="agent-timeline" class="agent-timeline">
              <p class="hint">Select a transfer to see its live agent timeline.</p>
            </div>
          </div>

          <div id="manager-reply-block" class="detail-block" hidden>
            <h3 class="eyebrow panel-header panel-header--flush panel-header--static detail-block__title">Manager Reply Injection</h3>
            <div class="controls-row">
              <button class="btn btn--outline preset-btn" data-preset="Huge promo tomorrow, we can't spare anything.">Cites a promo</button>
              <button class="btn btn--outline preset-btn" data-preset="No, we need everything we have.">Refuses, no reason</button>
              <button class="btn btn--outline preset-btn" data-preset="Understood, go ahead and take it.">Agrees</button>
            </div>
            <div class="controls-row">
              <input id="reply-text" type="text" placeholder="Type a manager reply..." class="input input--grow" aria-label="Manager reply" />
              <button id="reply-btn" class="btn btn--primary">Send reply</button>
            </div>
          </div>

          <div id="regional-override-block" class="detail-block" hidden>
            <h3 class="eyebrow panel-header panel-header--flush panel-header--static detail-block__title">Regional Director Override</h3>
            <div class="controls-row">
              <button id="override-approve" class="btn btn--signal">Force-approve current donor</button>
              <select id="override-donor" class="select" aria-label="Reroute donor"></select>
              <button id="override-reroute" class="btn btn--signal">Force-reroute</button>
            </div>
            <p id="override-result" class="hint"></p>
          </div>
        </div>
      </div>
    </div>

    <aside class="side-rail" aria-label="Network controls">
      <section class="panel floating-panel floating-panel--network" aria-labelledby="network-heading">
        <h2 class="eyebrow panel-header panel-header--static" id="network-heading">Network Status</h2>
        <div class="floating-panel--network__body">
          <div class="site-filter" id="site-filter" role="group" aria-label="Filter by site type">
            <button type="button" class="site-filter__btn type-XL is-active" data-site-type="XL" aria-pressed="true">XL</button>
            <button type="button" class="site-filter__btn type-L is-active" data-site-type="L" aria-pressed="true">L</button>
            <button type="button" class="site-filter__btn type-M is-active" data-site-type="M" aria-pressed="true">M</button>
            <button type="button" class="site-filter__btn type-S is-active" data-site-type="S" aria-pressed="true">S</button>
          </div>
          <div id="site-cards" class="site-cards"></div>
        </div>
      </section>

      <section class="panel floating-panel floating-panel--sim" aria-labelledby="sim-heading">
        <h2 class="eyebrow panel-header panel-header--bleed-corner panel-header--static" id="sim-heading">Simulate Incident</h2>
        <div class="controls-row">
          <select id="sim-site" class="select" aria-label="Site"></select>
          <div class="input-group">
            <select id="sim-hardware" class="select" aria-label="Hardware type">
              <option value="scanner">Scanner (TC58)</option>
              <option value="printer">Printer (ZQ521)</option>
            </select>
            <input id="sim-drop-to" type="number" value="0" min="0" class="input input--qty" aria-label="Drop stock to" />
          </div>
        </div>
        <p id="sim-site-levels" class="hint" aria-live="polite"></p>
        <p id="sim-result" class="hint"></p>
        <div class="sim-actions">
          <button id="sim-btn" class="btn btn--primary">Trigger shortage</button>
        </div>
      </section>
    </aside>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
